version: "3.8"

services:
  web:
    build: .
    container_name: slik_web
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      FLASK_ENV: development
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: flask run --host 0.0.0.0 --port 5000 --debug

  postgres:
    image: postgres:15-alpine
    container_name: slik_postgres
    environment:
      POSTGRES_USER: slik_user
      POSTGRES_PASSWORD: slik_pass
      POSTGRES_DB: slik_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slik_user"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: slik_redis
    ports:
      - "6379:6379"

volumes:
  pgdata: