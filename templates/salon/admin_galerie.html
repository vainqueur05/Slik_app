<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie - {{ tenant.nom }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.11"></script>
    <style>
        :root {
            --gold: #D4AF37;
            --bg-card: #0d0d0d;
            --border: rgba(255,255,255,0.06);
        }
        body { font-family: 'Inter', sans-serif; background: #050505; color: white; }
        h1, h2 { font-family: 'Montserrat', sans-serif; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeUp 0.6s ease-out; }
        .sticky-bottom { position: sticky; bottom: 0; background: #111; padding-top: 10px; margin-top: 10px; }

        /* ===== SIDEBAR ===== */
        .sidebar {
            background: linear-gradient(180deg, var(--bg-card), #050505);
            border-right: 1px solid var(--border);
            width: 250px;
            flex-shrink: 0;
        }
        .nav-link {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; border-radius: 12px;
            color: #a1a1aa; font-weight: 500; transition: all 0.3s; font-size: 0.92rem;
        }
        .nav-link:hover { background: rgba(255,255,255,0.04); color: white; transform: translateX(2px); }
        .nav-link.active {
            background: linear-gradient(135deg, rgba(212,175,55,0.1), transparent);
            color: var(--gold); border: 1px solid rgba(212,175,55,0.25);
        }
        .nav-link i { font-size: 1.1rem; width: 20px; }

        .menu-toggle {
            display: none;
            width: 42px; height: 42px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; color: white;
            align-items: center; justify-content: center;
            position: fixed; top: 16px; left: 16px; z-index: 101; cursor: pointer;
        }
        .menu-toggle i { font-size: 1.5rem; color: var(--gold); }
        .sidebar-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            z-index: 99; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .sidebar-overlay.active { opacity: 1; pointer-events: auto; }
        .close-sidebar {
            display: none; position: absolute; top: 16px; right: 16px;
            color: white; font-size: 1.5rem; cursor: pointer; z-index: 102;
        }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -250px; top: 0; bottom: 0; z-index: 100; transition: left 0.3s ease; }
            .sidebar.open { left: 0; }
            .menu-toggle { display: flex !important; }
            .close-sidebar { display: block; }
        }
    </style>
</head>
<body class="flex min-h-screen relative">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">
        <!-- Bouton fermeture mobile -->
        <div class="close-sidebar" id="close-sidebar-btn" onclick="closeSidebar()">
            <i class="bi bi-x-lg"></i>
        </div>

        <div class="px-5 pt-16 pb-5">
            <h2 class="text-2xl font-bold text-[#D4AF37]">{{ tenant.nom }}</h2>
        </div>

        <nav class="space-y-1 px-5">
            <a href="/salon/{{ tenant.slug }}/admin" class="nav-link"><i class="bi bi-house"></i> Accueil</a>
            <a href="/salon/{{ tenant.slug }}/admin/services" class="nav-link"><i class="bi bi-scissors"></i> Services</a>
            <a href="/salon/{{ tenant.slug }}/admin/coiffeurs" class="nav-link"><i class="bi bi-people"></i> Équipe</a>
            <a href="/salon/{{ tenant.slug }}/admin/galerie" class="nav-link active"><i class="bi bi-images"></i> Galerie</a>
            <a href="/salon/{{ tenant.slug }}/admin/bookings" class="nav-link"><i class="bi bi-calendar-check"></i> Réservations</a>
            <a href="/salon/{{ tenant.slug }}/admin/temoignages" class="nav-link"><i class="bi bi-star"></i> Avis</a>
            <a href="/salon/{{ tenant.slug }}/admin/theme" class="nav-link"><i class="bi bi-palette"></i> Thème</a>
            <a href="/salon/{{ tenant.slug }}/admin/map" class="nav-link"><i class="bi bi-geo-alt"></i> Carte</a>
        </nav>
    </aside>

    <!-- Overlay mobile -->
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- Bouton hamburger mobile -->
    <button class="menu-toggle" id="menu-toggle-btn" onclick="openSidebar()">
        <i class="bi bi-list"></i>
    </button>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="flex-1 p-6 lg:p-8 animate-fade-up">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold">Galerie Avant/Après</h1>
            <button onclick="document.getElementById('galerie-modal').classList.remove('hidden')"
                    class="bg-[#D4AF37] text-black px-4 py-2 rounded-full font-bold hover:bg-yellow-500 transition flex items-center gap-2">
                <i class="bi bi-plus-circle"></i> Ajouter une photo
            </button>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            {% for img in galeries %}
            <div class="bg-[#111] border border-gray-700 rounded-xl overflow-hidden relative group animate-fade-up">
                <img src="{{ img.photo_url }}" class="w-full h-40 object-cover">
                <div class="absolute top-2 left-2 bg-black bg-opacity-70 text-xs font-bold px-2 py-1 rounded {{ 'text-green-400' if img.type == 'apres' else 'text-red-400' }}">{{ img.type | capitalize }}</div>
                <div class="p-3">
                    <p class="text-sm text-gray-300 truncate">{{ img.legende or 'Sans légende' }}</p>
                    <form method="POST" action="/salon/{{ tenant.slug }}/admin/galerie/delete/{{ img.id }}" class="mt-2" onsubmit="return confirm('Supprimer cette photo ?')">
                        <button type="submit" class="text-xs text-red-400 hover:underline flex items-center gap-1"><i class="bi bi-trash"></i> Supprimer</button>
                    </form>
                </div>
            </div>
            {% else %}
            <p class="text-gray-500 col-span-4 text-center py-8">Aucune photo dans la galerie.</p>
            {% endfor %}
        </div>

        <!-- MODAL Galerie -->
        <div id="galerie-modal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50" onclick="if(event.target===this) this.classList.add('hidden')">
            <div class="bg-[#111] p-6 rounded-xl max-w-md w-full mx-4 border border-[#D4AF37] animate-fade-up" style="max-height:85vh; overflow-y:auto;">
                <h3 class="text-xl font-bold mb-4 text-[#D4AF37] flex items-center gap-2"><i class="bi bi-cloud-upload"></i> Ajouter à la galerie</h3>
                <form method="POST" action="/salon/{{ tenant.slug }}/admin/galerie" class="space-y-4">
                    <input type="hidden" name="photo_cloudinary_id" id="upload-galerie-cloudinary-id" value="">
                    <input type="hidden" name="photo_url" id="upload-galerie-cloudinary-url" value="">
                    <div>
                        <label class="block text-sm mb-1">Type</label>
                        <select name="type" class="w-full bg-black border border-gray-700 rounded p-2 text-white">
                            <option value="avant">Avant</option>
                            <option value="apres">Après</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm mb-1">Légende</label>
                        <input type="text" name="legende" class="w-full bg-black border border-gray-700 rounded p-2 text-white" placeholder="De ça → À ça en 45min">
                    </div>

                    <div id="upload-galerie"></div>

                    <div class="sticky-bottom">
                        <button type="submit" id="btn-save-galerie"
                                class="w-full bg-[#D4AF37] text-black py-2 rounded-full font-bold hover:bg-yellow-500 transition flex items-center justify-center gap-2">
                            <i class="bi bi-check-lg"></i> Ajouter
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="/static/js/slik-upload.js"></script>
    <script>
        // ===== Sidebar mobile =====
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        function openSidebar() {
            sidebar.classList.add('open');
            overlay.classList.add('active');
        }
        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }
        document.querySelectorAll('.sidebar .nav-link').forEach(link => {
            link.addEventListener('click', function() {
                if (window.innerWidth <= 768) closeSidebar();
            });
        });

        // ===== Upload galerie =====
        let galerieWidgetInitialized = false;
        function initGalerieUpload() {
            if (!galerieWidgetInitialized) {
                SLIK_UPLOAD.init('upload-galerie', { tenantSlug: '{{ tenant.slug }}', btnSaveId: 'btn-save-galerie' });
                galerieWidgetInitialized = true;
            }
        }
        function resetForm() {
            document.getElementById('upload-galerie-cloudinary-id').value = '';
            document.getElementById('upload-galerie-cloudinary-url').value = '';
            document.getElementById('btn-save-galerie').disabled = false;
            const widgetContainer = document.getElementById('upload-galerie');
            widgetContainer.innerHTML = '';
            galerieWidgetInitialized = false;
            initGalerieUpload();
        }
        window.addEventListener('load', resetForm);
        document.querySelector('[onclick*="galerie-modal"]').addEventListener('click', resetForm);
    </script>
</body>
</html>
