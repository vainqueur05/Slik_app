<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramètres - {{ tenant.nom }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; }
        h1, h2 { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="bg-black text-white flex min-h-screen">
    <aside class="w-64 bg-[#0a0a0a] border-r border-gray-800 p-6 flex-shrink-0">
        <h2 class="text-2xl font-bold text-[#D4AF37] mb-8">{{ tenant.nom }}</h2>
        <nav class="space-y-1">
            <a href="/salon/{{ tenant.slug }}/admin" class="flex items-center gap-2 py-2.5 px-4 rounded-lg hover:bg-gray-800 transition"><i class="bi bi-house"></i> Accueil</a>
            <a href="/salon/{{ tenant.slug }}/admin/services" class="flex items-center gap-2 py-2.5 px-4 rounded-lg hover:bg-gray-800 transition"><i class="bi bi-scissors"></i> Services</a>
            <a href="/salon/{{ tenant.slug }}/admin/settings" class="flex items-center gap-2 py-2.5 px-4 rounded-lg bg-[#D4AF37] bg-opacity-20 text-[#D4AF37] font-semibold"><i class="bi bi-sliders2"></i> Paramètres</a>
            <a href="/salon/{{ tenant.slug }}/admin/reservations" class="flex items-center gap-2 py-2.5 px-4 rounded-lg hover:bg-gray-800 transition"><i class="bi bi-calendar-check"></i> Réservations</a>
            <!-- autres liens... -->
        </nav>
    </aside>

    <main class="flex-1 p-8">
        <h1 class="text-3xl font-bold mb-6">Paramètres du salon</h1>
        <div class="bg-[#111] border border-gray-800 rounded-xl p-6 max-w-2xl">
            <h2 class="text-xl font-bold mb-4 text-[#D4AF37]">Types de Services Proposés</h2>
            <form method="POST" class="space-y-4">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    {% for cat in categories %}
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" name="categories" value="{{ cat }}"
                            {% if cat in active_cats %}checked{% endif %}
                            class="rounded border-gray-600 bg-black text-[#D4AF37] focus:ring-[#D4AF37]">
                        <span>{{ cat }}</span>
                    </label>
                    {% endfor %}
                </div>
                <button type="submit" class="mt-4 bg-[#D4AF37] text-black px-6 py-2 rounded-full font-bold hover:bg-yellow-500 transition">
                    <i class="bi bi-check-lg"></i> Enregistrer les types
                </button>
            </form>
        </div>
    </main>
</body>
</html>
