<!-- ===== MODALE DE RÉSERVATION (vanilla JS + fetch) ===== -->
<div id="booking-modal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50" onclick="if(event.target===this) closeBookingModal()">
  <div class="bg-[#111] p-6 rounded-xl max-w-lg w-full mx-4 border border-[#D4AF37]" style="max-height:90vh;overflow-y:auto;">
    <h3 class="text-xl font-bold mb-4 text-[#D4AF37] flex items-center gap-2"><i class="bi bi-calendar-check"></i> Réservation Express</h3>
    <div id="booking-form-container"></div>
    <button onclick="closeBookingModal()" class="mt-3 text-gray-500 hover:text-white underline text-sm">Fermer</button>
  </div>
</div>

<script>
    // Données Jinja → JS
    const _services = [
        {% for s in services %}
        { id: "{{ s.id }}", nom: "{{ s.nom }}", prix: "{{ s.prix }}" },
        {% endfor %}
    ];
    const _coiffeurs = [
        {% for c in coiffeurs %}
        { id: "{{ c.id }}", nom: "{{ c.nom }}" },
        {% endfor %}
    ];

    function openBookingModal(serviceId, coiffeurId) {
        const modal = document.getElementById('booking-modal');
        const container = document.getElementById('booking-form-container');
        if (!modal || !container) return;
        modal.classList.remove('hidden');

        let serviceOpts = '';
        _services.forEach(s => {
            const sel = (serviceId && String(serviceId) === s.id) ? ' selected' : '';
            serviceOpts += `<option value="${s.id}"${sel}>${s.nom} - ${s.prix}</option>`;
        });
        let coiffeurOpts = '<option value="">-- Choisir --</option>';
        _coiffeurs.forEach(c => {
            const sel = (coiffeurId && String(coiffeurId) === c.id) ? ' selected' : '';
            coiffeurOpts += `<option value="${c.id}"${sel}>${c.nom}</option>`;
        });

        container.innerHTML = `
            <form id="booking-form" class="space-y-3 text-sm">
                <div><label class="block mb-1 font-medium">Votre nom</label><input type="text" name="client_nom" required class="w-full bg-black border border-gray-700 rounded p-2 text-white" placeholder="Nom complet"></div>
                <div><label class="block mb-1 font-medium">Téléphone</label><input type="tel" name="client_phone" required class="w-full bg-black border border-gray-700 rounded p-2 text-white" placeholder="+243 8XX XXX XXX"></div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="block mb-1 font-medium">Date</label><input type="date" name="date_rdv" required class="w-full bg-black border border-gray-700 rounded p-2 text-white"></div>
                    <div><label class="block mb-1 font-medium">Heure</label><input type="time" name="heure_rdv" required class="w-full bg-black border border-gray-700 rounded p-2 text-white"></div>
                </div>
                <div><label class="block mb-1 font-medium">Service</label><select name="service_id" class="w-full bg-black border border-gray-700 rounded p-2 text-white">${serviceOpts}</select></div>
                <div><label class="block mb-1 font-medium">Coiffeur (optionnel)</label><select name="coiffeur_id" class="w-full bg-black border border-gray-700 rounded p-2 text-white">${coiffeurOpts}</select></div>
                <button type="submit" id="booking-submit-btn" class="w-full bg-[#DC2626] text-white py-2.5 rounded-full font-bold hover:bg-red-700 transition text-base">Confirmer ma réservation</button>
            </form>`;

        document.getElementById('booking-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('booking-submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-hourglass-split animate-spin"></i> Envoi...';

            fetch('/{{ tenant.slug }}/booking', {
                method: 'POST',
                body: new FormData(this)
            })
            .then(r => r.text())
            .then(html => {
                document.getElementById('booking-form-container').innerHTML = `
                    <div class="bg-green-700 text-white p-3 rounded-xl text-center text-sm">
                        <i class="bi bi-check-circle text-3xl"></i>
                        <p class="font-bold mt-2">Réservation envoyée avec succès !</p>
                        <p class="text-xs text-gray-300">Le salon vous contactera très vite.</p>
                    </div>`;
                setTimeout(() => modal.classList.add('hidden'), 2500);
            })
            .catch(() => {
                alert('Erreur réseau. Réessaie.');
                btn.disabled = false;
                btn.innerHTML = 'Confirmer ma réservation';
            });
        });
    }

    function closeBookingModal() {
        document.getElementById('booking-modal').classList.add('hidden');
    }
</script>
