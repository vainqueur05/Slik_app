
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - SLIK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; }
        h1 { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white">
    <div class="bg-[#111] border border-gray-800 rounded-xl p-8 w-full max-w-sm mx-4 shadow-2xl">
        <h1 class="text-3xl font-bold text-[#D4AF37] mb-6 text-center">SLIK</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="mb-4 p-2 rounded text-sm text-center {{ 'bg-green-900 text-green-400' if category == 'success' else 'bg-red-900 text-red-400' }}">{{ message }}</div>
          {% endfor %}
        {% endwith %}
        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm mb-1">Email</label>
                <input type="email" name="email" required class="w-full bg-black border border-gray-700 rounded p-2 text-white" placeholder="admin@slik.cd">
            </div>
            <div>
                <label class="block text-sm mb-1">Mot de passe</label>
                <input type="password" name="password" required class="w-full bg-black border border-gray-700 rounded p-2 text-white" placeholder="••••••">
            </div>
            <button type="submit" class="w-full bg-[#D4AF37] text-black py-2 rounded-full font-bold hover:bg-yellow-500 transition">
                Se connecter
            </button>
        </form>
    </div>
</body>
</html>
